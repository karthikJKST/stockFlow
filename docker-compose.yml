services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockflow
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow
    ports:
      - "5432:5432"
    volumes:
      - stockflow-db:/var/lib/postgresql/data
  api:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://database:5432/stockflow
      DB_USERNAME: stockflow
      DB_PASSWORD: stockflow
    ports:
      - "8080:8080"
    depends_on:
      - database
volumes:
  stockflow-db:
