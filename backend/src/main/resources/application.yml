spring:
  application:
    name: stockflow-api
  # Default datasource: H2 for local dev. Driver is auto-detected from the URL.
  # Production (profile=prod) overrides url/username/password + explicitly sets PostgreSQL driver.
  datasource:
    url: jdbc:h2:mem:stockflow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

finnhub:
  api-key: ${FINNHUB_API_KEY:}

jwt:
  # ⚠️ IMPORTANT: Override JWT_SECRET env var in production!
  # The default below is a well-known DEVELOPMENT-ONLY value.
  # Set the JWT_SECRET environment variable to a strong, unique secret.
  secret: ${JWT_SECRET:StockFlowDevSecret2026SuperSecretKeyForJWT}
  expiration-ms: 86400000

server:
  port: 8080
