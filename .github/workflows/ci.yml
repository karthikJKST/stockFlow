name: StockFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile backend
        run: mvn compile -q
        working-directory: StockFlow/backend

      - name: Run backend tests (if any)
        run: mvn test -q
        working-directory: StockFlow/backend
        continue-on-error: true

      - name: Package backend JAR
        run: mvn package -DskipTests -q
        working-directory: StockFlow/backend

      - name: Upload backend JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: StockFlow/backend/target/*.jar
          retention-days: 3

  frontend:
    name: Frontend — Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: StockFlow/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: StockFlow/frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: StockFlow/frontend

      - name: Build frontend (Vite)
        run: npm run build
        working-directory: StockFlow/frontend

      - name: Upload frontend build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: StockFlow/frontend/dist
          retention-days: 3

  docker:
    name: Docker — Build Backend Image
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: StockFlow/backend/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: StockFlow/backend
          push: false
          tags: stockflow-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: always()

    steps:
      - name: Check workflow status
        run: |
          echo "## StockFlow CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Build & Test) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Build & Typecheck) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker (Image Build) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
