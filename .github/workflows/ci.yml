name: StockFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile backend
        run: mvn compile -q
        working-directory: backend

      - name: Run backend tests
        run: mvn test -q
        working-directory: backend

      - name: Package backend JAR
        run: mvn package -DskipTests -q
        working-directory: backend

      - name: Upload backend JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 3

  frontend:
    name: Frontend — Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build frontend (Vite)
        run: npm run build
        working-directory: frontend

      - name: Upload frontend build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  docker:
    name: Docker — Build Backend Image
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: stockflow-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: always()

    steps:
      - name: Check workflow status
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
        run: |
          badge() {
            case "$1" in
              success) echo "✅ Passed";;
              failure) echo "❌ Failed";;
              skipped) echo "⏭️ Skipped";;
              cancelled) echo "🚫 Cancelled";;
              *) echo "⬜ $1";;
            esac
          }
          echo "## StockFlow CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend (Build & Test) | $(badge $BACKEND_RESULT) |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (Build & Typecheck) | $(badge $FRONTEND_RESULT) |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker (Image Build) | $(badge $DOCKER_RESULT) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$BACKEND_RESULT" = "success" ] && [ "$FRONTEND_RESULT" = "success" ] && [ "$DOCKER_RESULT" = "success" ]; then
            echo "🎉 All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some checks failed — review logs above." >> $GITHUB_STEP_SUMMARY
          fi
